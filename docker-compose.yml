services:

  storage:
    build:
      context: .
      dockerfile: Dockerfile.storage
    profiles: ["local"]
    ports:
      - "${STORAGE_PORT:-8000}:8000"
    volumes:
      - model_data:/data/models
      - ./algorithms:/opt/fedstr/algorithms
      - ./data:/opt/fedstr/data
      - ./logs:/opt/fedstr/logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  dvm-0:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      FEDSTR_AUTH_TOKEN: ${STORAGE_AUTH_TOKEN:-}
      ALGORITHM: ${ALGORITHM:-fedavg}
      DATASET: ${DATASET:-mnist}
      DVM_ID: "0"
    volumes:
      - model_data:/tmp/fedstr_models
      - ./algorithms:/opt/fedstr/algorithms
      - ./data:/opt/fedstr/data
      - ./logs:/opt/fedstr/logs
    command:
      - sh
      - -c
      - >
        fedstr-dvm
        --id 0
        --keypair-hex ${DVM_0_NSEC_HEX}
        --relays ${NOSTR_RELAY:-wss://relay.knikolakakis.com}
        --storage ${STORAGE_URL:-http://storage:8000}
        2>&1 | tee /opt/fedstr/logs/dvm_0_protocol.log
    restart: unless-stopped

  dvm-1:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      FEDSTR_AUTH_TOKEN: ${STORAGE_AUTH_TOKEN:-}
      ALGORITHM: ${ALGORITHM:-fedavg}
      DATASET: ${DATASET:-mnist}
      DVM_ID: "1"
    volumes:
      - model_data:/tmp/fedstr_models
      - ./algorithms:/opt/fedstr/algorithms
      - ./data:/opt/fedstr/data
      - ./logs:/opt/fedstr/logs
    command:
      - sh
      - -c
      - >
        fedstr-dvm
        --id 1
        --keypair-hex ${DVM_1_NSEC_HEX}
        --relays ${NOSTR_RELAY:-wss://relay.knikolakakis.com}
        --storage ${STORAGE_URL:-http://storage:8000}
        2>&1 | tee /opt/fedstr/logs/dvm_1_protocol.log
    restart: unless-stopped

  dvm-2:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["dvm3", "dvm4"]
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      FEDSTR_AUTH_TOKEN: ${STORAGE_AUTH_TOKEN:-}
      ALGORITHM: ${ALGORITHM:-fedavg}
      DATASET: ${DATASET:-mnist}
      DVM_ID: "2"
    volumes:
      - model_data:/tmp/fedstr_models
      - ./algorithms:/opt/fedstr/algorithms
      - ./data:/opt/fedstr/data
      - ./logs:/opt/fedstr/logs
    command:
      - sh
      - -c
      - >
        fedstr-dvm
        --id 2
        --keypair-hex ${DVM_2_NSEC_HEX}
        --relays ${NOSTR_RELAY:-wss://relay.knikolakakis.com}
        --storage ${STORAGE_URL:-http://storage:8000}
        2>&1 | tee /opt/fedstr/logs/dvm_2_protocol.log
    restart: unless-stopped

  dvm-3:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: ["dvm4"]
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      FEDSTR_AUTH_TOKEN: ${STORAGE_AUTH_TOKEN:-}
      ALGORITHM: ${ALGORITHM:-fedavg}
      DATASET: ${DATASET:-mnist}
      DVM_ID: "3"
    volumes:
      - model_data:/tmp/fedstr_models
      - ./algorithms:/opt/fedstr/algorithms
      - ./data:/opt/fedstr/data
      - ./logs:/opt/fedstr/logs
    command:
      - sh
      - -c
      - >
        fedstr-dvm
        --id 3
        --keypair-hex ${DVM_3_NSEC_HEX}
        --relays ${NOSTR_RELAY:-wss://relay.knikolakakis.com}
        --storage ${STORAGE_URL:-http://storage:8000}
        2>&1 | tee /opt/fedstr/logs/dvm_3_protocol.log
    restart: unless-stopped

  customer:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - dvm-0
      - dvm-1
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      FEDSTR_AUTH_TOKEN: ${STORAGE_AUTH_TOKEN:-}
      ALGORITHM: ${ALGORITHM:-fedavg}
      DATASET: ${DATASET:-mnist}
    volumes:
      - model_data:/tmp/fedstr_models
      - ./algorithms:/opt/fedstr/algorithms
      - ./data:/opt/fedstr/data
      - ./logs:/opt/fedstr/logs
    command:
      - sh
      - -c
      - >
        sleep ${CUSTOMER_WAIT:-15} &&
        fedstr-customer
        --num-dvms ${NUM_DVMS:-2}
        --rounds ${ROUNDS:-3}
        --epochs ${EPOCHS_PER_ROUND:-3}
        --batch-size ${BATCH_SIZE:-32}
        --dataset ${DATASET:-shakespeare}
        --relays ${NOSTR_RELAY:-wss://relay.knikolakakis.com}
        --storage ${STORAGE_URL:-http://storage:8000}
        2>&1 | tee /opt/fedstr/logs/customer_protocol.log
    restart: "no"

volumes:
  model_data: